<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gewicht Tracker</title>

<style>

body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 15px;
    background: #f2f2f2;
}

.container {
    max-width: 500px;
    margin: auto;
    background: white;
    padding: 15px;
    border-radius: 15px;
}


h1 {
    text-align: center;
}


canvas {
    width: 100%;
    height: 250px;
    border: 1px solid #ddd;
    margin-top: 10px;
}


input {
    width: 60%;
    font-size: 20px;
    padding: 12px;
}


button {

    width: 100%;
    margin-top: 10px;
    padding: 14px;

    font-size: 18px;
    border-radius: 10px;
    border: none;

    background: #333;
    color: white;
}


table {

    width:100%;
    margin-top:20px;
    border-collapse:collapse;

}


th,td {

    border-bottom:1px solid #ddd;
    padding:10px;
    text-align:center;

}


.delete {

    background:#aa0000;

}


</style>

</head>


<body>


<div class="container">


<h1>⚖️ Gewicht</h1>


<h3>Entwicklung</h3>

<canvas id="chart"
width="450"
height="250">
</canvas>



<h3>Neuer Eintrag</h3>


<input 
id="gewicht"
type="number"
step="0.1"
placeholder="kg">


<button onclick="speichern()">
Speichern
</button>



<button onclick="exportieren()">
📥 Excel Export (CSV)
</button>



<h3>Daten</h3>


<table>

<thead>

<tr>
<th>Datum</th>
<th>Gewicht</th>
<th></th>
</tr>

</thead>


<tbody id="tabelle">

</tbody>


</table>


</div>



<script>


let daten =
JSON.parse(localStorage.getItem("gewichtDaten"))
|| [];





function speichern(){


let feld =
document.getElementById("gewicht");


let wert =
Number(feld.value);



if(!wert){

alert("Bitte Gewicht eingeben");

return;

}



daten.push({

datum:
new Date().toLocaleDateString("de-DE"),

gewicht:
wert

});



localStorage.setItem(
"gewichtDaten",
JSON.stringify(daten)
);



feld.value="";


anzeigen();


}





function anzeigen(){


let tabelle =
document.getElementById("tabelle");


tabelle.innerHTML="";



daten.forEach((eintrag,index)=>{


tabelle.innerHTML += `

<tr>

<td>${eintrag.datum}</td>

<td>${eintrag.gewicht} kg</td>

<td>

<button class="delete"
onclick="loeschen(${index})">
X
</button>

</td>

</tr>

`;


});



zeichnen();


}





function loeschen(index){


daten.splice(index,1);


localStorage.setItem(
"gewichtDaten",
JSON.stringify(daten)
);


anzeigen();


}





function exportieren(){


let csv =
"Datum,Gewicht kg\n";



daten.forEach(x=>{


csv +=
x.datum + "," +
x.gewicht +
"\n";


});



let blob =
new Blob(
[csv],
{
type:"text/csv"
}
);



let link =
document.createElement("a");


link.href =
URL.createObjectURL(blob);



link.download =
"Gewicht_Tracker.csv";



link.click();



}





function zeichnen(){


let canvas =
document.getElementById("chart");


let ctx =
canvas.getContext("2d");



ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);



if(daten.length < 2)
return;



let min =
Math.min(...daten.map(x=>x.gewicht))-1;


let max =
Math.max(...daten.map(x=>x.gewicht))+1;



ctx.beginPath();



daten.forEach((x,i)=>{


let xpos =
40 +
i *
((canvas.width-60) /
(daten.length-1));



let ypos =
canvas.height-30 -
((x.gewicht-min)/(max-min))
*
(canvas.height-60);



if(i===0)

ctx.moveTo(xpos,ypos);

else

ctx.lineTo(xpos,ypos);



});



ctx.strokeStyle="blue";

ctx.lineWidth=3;

ctx.stroke();



}





anzeigen();


</script>


</body>

</html>
