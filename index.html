<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon.png">
    <title>Gewichtstracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, sans-serif;
            background: #f5f5f5;
            padding: 12px;
            max-width: 480px;
            margin: 0 auto;
        }
        .container {
            background: white;
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 { font-size: 22px; margin-bottom: 16px; color: #333; }
        input, button {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 10px;
            margin-bottom: 10px;
        }
        button {
            background: #007aff;
            color: white;
            border: none;
            font-weight: 600;
            cursor: pointer;
        }
        button:active { opacity: 0.7; }
        .btn-update { background: #ff3b30; }
        table { width: 100%; margin-top: 16px; font-size: 15px; }
        th { text-align: left; padding: 8px 0; border-bottom: 2px solid #ddd; }
        td { padding: 8px 0; border-bottom: 1px solid #eee; }
        .empty { text-align: center; padding: 30px 0; color: #999; }
        .status {
            padding: 12px;
            border-radius: 10px;
            margin: 10px 0;
            display: none;
            font-size: 14px;
        }
        .status.show { display: block; }
        .status.success { background: #d4edda; color: #155724; }
        .status.error { background: #f8d7da; color: #721c24; }
        .status.info { background: #d1ecf1; color: #0c5460; }
        .delete-btn {
            background: none;
            border: none;
            color: #ff3b30;
            font-size: 18px;
            cursor: pointer;
            padding: 0 8px;
            width: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Gewicht</h1>
        
        <input type="date" id="datum">
        <input type="number" id="gewicht" step="0.1" placeholder="Gewicht in kg">
        <button onclick="addData()">➕ Hinzufügen</button>
        <button class="btn-update" onclick="appUpdate()">🔄 App Update</button>
        
        <div id="status" class="status"></div>
        
        <div id="tableContainer">
            <table>
                <thead><tr><th>Datum</th><th>kg</th><th></th></tr></thead>
                <tbody id="dataBody"></tbody>
            </table>
            <div id="emptyState" class="empty">📭 Keine Daten</div>
        </div>
    </div>

<script>
// ============================================
// DATEN VERWALTEN
// ============================================
function loadData() {
    try { return JSON.parse(localStorage.getItem("gewichtDaten") || "[]"); } 
    catch { return []; }
}

function saveData(data) {
    localStorage.setItem("gewichtDaten", JSON.stringify(data));
    render();
}

function render() {
    const data = loadData();
    const tbody = document.getElementById("dataBody");
    const empty = document.getElementById("emptyState");
    
    if (data.length === 0) {
        tbody.innerHTML = "";
        empty.style.display = "block";
        return;
    }
    
    empty.style.display = "none";
    tbody.innerHTML = data.map((x, index) => 
        `<tr>
            <td>${x.datum}</td>
            <td>${x.gewicht}</td>
            <td><button class="delete-btn" onclick="deleteRow(${index})">✕</button></td>
        </tr>`
    ).join("");
}

function addData() {
    const datum = document.getElementById("datum").value;
    const gewicht = document.getElementById("gewicht").value;
    
    if (!datum || !gewicht || gewicht <= 0) {
        showStatus("Bitte Datum und Gewicht eingeben", "error");
        return;
    }
    
    const data = loadData();
    data.push({ datum, gewicht: parseFloat(gewicht) });
    saveData(data);
    document.getElementById("gewicht").value = "";
    showStatus("✅ Hinzugefügt", "success");
}

// EINZELNE ZEILE LÖSCHEN
function deleteRow(index) {
    if (!confirm("Diese Zeile löschen?")) return;
    const data = loadData();
    data.splice(index, 1);
    saveData(data);
    showStatus("🗑️ Gelöscht", "info");
}

function showStatus(msg, type = "info") {
    const el = document.getElementById("status");
    el.textContent = msg;
    el.className = "status show " + type;
    clearTimeout(el._timeout);
    el._timeout = setTimeout(() => el.className = "status", 4000);
}

// ============================================
// APP UPDATE - NUR BACKUP + COOKIES + RELOAD
// ============================================
function appUpdate() {
    if (!confirm("Backup erstellen und App aktualisieren?")) return;
    
    try {
        const daten = loadData();
        
        // ============================================
        // 1. EXPORT ALS CSV
        // ============================================
        let csv = "Datum,Gewicht kg\n";
        daten.forEach(x => csv += x.datum + "," + x.gewicht + "\n");
        
        const blob = new Blob([csv], { type: "text/csv" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "Backup_" + new Date().toISOString().split('T')[0] + ".csv";
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(link.href);
        
        showStatus("📥 Backup erstellt", "info");
        
        // ============================================
        // 2. WARTEN BIS DOWNLOAD FERTIG
        // ============================================
        setTimeout(async () => {
            try {
                // ALLE COOKIES LÖSCHEN
                document.cookie.split(";").forEach(c => {
                    document.cookie = c.split("=")[0] + "=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
                });
                
                // LOCALSTORAGE LÖSCHEN
                localStorage.clear();
                
                // SESSIONSTORAGE LÖSCHEN
                sessionStorage.clear();
                
                // CACHE LÖSCHEN
                if ("caches" in window) {
                    try {
                        const keys = await caches.keys();
                        for (const key of keys) {
                            await caches.delete(key);
                        }
                    } catch (e) {}
                }
                
                // SERVICE WORKER LÖSCHEN
                if ("serviceWorker" in navigator && window.location.protocol !== "file:") {
                    try {
                        const regs = await navigator.serviceWorker.getRegistrations();
                        for (const reg of regs) {
                            await reg.unregister();
                        }
                    } catch (e) {}
                }
                
                // SEITE NEU LADEN
                window.location.reload(true);
                
            } catch (e) {
                showStatus("❌ Fehler: " + e.message, "error");
            }
        }, 2000);
        
    } catch (e) {
        showStatus("❌ Fehler: " + e.message, "error");
    }
}

// ============================================
// SERVICE WORKER REGISTRIEREN
// ============================================
if ("serviceWorker" in navigator && window.location.protocol !== "file:") {
    window.addEventListener("load", () => {
        navigator.serviceWorker.register("service-worker.js")
            .then(() => console.log("✅ SW registriert"))
            .catch(() => console.log("❌ SW Fehler"));
    });
}

// ============================================
// INIT
// ============================================
document.addEventListener("DOMContentLoaded", function() {
    const heute = new Date().toISOString().split('T')[0];
    document.getElementById("datum").value = heute;
    render();
    document.getElementById("gewicht").addEventListener("keypress", function(e) {
        if (e.key === "Enter") addData();
    });
});
</script>
</body>
</html>
