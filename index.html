<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon.png">
    <title>Gewichtstracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, sans-serif;
            background: #f5f5f5;
            padding: 12px;
            max-width: 480px;
            margin: 0 auto;
        }
        .container {
            background: white;
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 { font-size: 22px; margin-bottom: 16px; color: #333; }
        input, button {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 10px;
            margin-bottom: 10px;
        }
        button {
            background: #156082;
            color: white;
            border: none;
            font-weight: 600;
            cursor: pointer;
        }
        button:active { opacity: 0.7; }
        .btn-update { background: #156082; }
        .btn-export { background: #156082; }
        .btn-import { background: #156082; }
        
        .chart-wrapper {
            margin: 16px 0;
            background: #f8f9fa;
            border-radius: 10px;
            overflow-x: scroll;
            overflow-y: hidden;
            -webkit-overflow-scrolling: touch;
            position: relative;
            scroll-behavior: smooth;
            touch-action: pan-x;
        }
        .chart-wrapper canvas {
            display: block;
            height: 280px !important;
            max-height: 280px;
            width: auto !important;
        }
        .chart-scroll-hint {
            text-align: center;
            font-size: 12px;
            color: #999;
            padding: 4px 0;
        }
        
        table { width: 100%; margin-top: 16px; font-size: 15px; }
        th { text-align: left; padding: 8px 0; border-bottom: 2px solid #ddd; }
        td { padding: 8px 0; border-bottom: 1px solid #eee; }
        .empty { text-align: center; padding: 30px 0; color: #999; }
        .status {
            padding: 12px;
            border-radius: 10px;
            margin: 10px 0;
            display: none;
            font-size: 14px;
        }
        .status.show { display: block; }
        .status.success { background: #d4edda; color: #155724; }
        .status.error { background: #f8d7da; color: #721c24; }
        .status.info { background: #d1ecf1; color: #0c5460; }
        .delete-btn {
            background: none;
            border: none;
            color: #ff3b30;
            font-size: 18px;
            cursor: pointer;
            padding: 0 8px;
            width: auto;
        }
        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }
        .file-input-wrapper input[type=file] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Gewicht</h1>
        
        <input type="date" id="datum">
        <input type="number" id="gewicht" step="0.1" placeholder="Gewicht in kg">
        <button onclick="addData()">➕ Hinzufügen</button>
        
        <button class="btn-export" onclick="exportCSV()">📤 Export CSV</button>
        
        <div class="file-input-wrapper">
            <button class="btn-import" style="width:100%;">📥 Import CSV</button>
            <input type="file" id="fileInput" accept=".csv" onchange="importCSV(event)">
        </div>
        
        <div class="chart-wrapper" id="chartWrapper">
            <canvas id="weightChart"></canvas>
        </div>
        <div class="chart-scroll-hint" id="scrollHint">← scrollen für ältere Daten | 7 Tage sichtbar →</div>
        
        <button class="btn-update" onclick="appUpdate()">🔄 App Update</button>
        
        <div id="status" class="status"></div>
        
        <div id="tableContainer">
            <table>
                <thead><tr><th>Datum</th><th>kg</th><th></th></tr></thead>
                <tbody id="dataBody"></tbody>
            </table>
            <div id="emptyState" class="empty">📭 Keine Daten</div>
        </div>
    </div>

<script>
// ============================================
// CHART VARIABLE
// ============================================
let chart = null;

// ============================================
// DATEN VERWALTEN
// ============================================
function loadData() {
    try { return JSON.parse(localStorage.getItem("gewichtDaten") || "[]"); } 
    catch { return []; }
}

function saveData(data) {
    localStorage.setItem("gewichtDaten", JSON.stringify(data));
    render();
    updateChart();
}

function render() {
    const data = loadData();
    const tbody = document.getElementById("dataBody");
    const empty = document.getElementById("emptyState");
    
    if (data.length === 0) {
        tbody.innerHTML = "";
        empty.style.display = "block";
        return;
    }
    
    empty.style.display = "none";
    const sorted = [...data].sort((a, b) => new Date(a.datum) - new Date(b.datum));
    tbody.innerHTML = sorted.map((x, index) => 
        `<tr>
            <td>${x.datum}</td>
            <td>${x.gewicht}</td>
            <td><button class="delete-btn" onclick="deleteRow('${x.datum}', ${x.gewicht})">✕</button></td>
        </tr>`
    ).join("");
}

function addData() {
    const datum = document.getElementById("datum").value;
    const gewicht = document.getElementById("gewicht").value;
    
    if (!datum || !gewicht || gewicht <= 0) {
        showStatus("Bitte Datum und Gewicht eingeben", "error");
        return;
    }
    
    const data = loadData();
    data.push({ datum, gewicht: parseFloat(gewicht) });
    saveData(data);
    document.getElementById("gewicht").value = "";
    showStatus("✅ Hinzugefügt", "success");
}

function deleteRow(datum, gewicht) {
    if (!confirm("Diese Zeile löschen?")) return;
    const data = loadData();
    const index = data.findIndex(x => x.datum === datum && x.gewicht === gewicht);
    if (index !== -1) {
        data.splice(index, 1);
        saveData(data);
        showStatus("🗑️ Gelöscht", "info");
    }
}

function showStatus(msg, type = "info") {
    const el = document.getElementById("status");
    el.textContent = msg;
    el.className = "status show " + type;
    clearTimeout(el._timeout);
    el._timeout = setTimeout(() => el.className = "status", 4000);
}

// ============================================
// CHART - SCHWARZE ZAHLEN, OHNE HINTERGRUND
// ============================================
function updateChart() {
    const data = loadData();
    
    if (data.length === 0) {
        if (chart) {
            chart.destroy();
            chart = null;
        }
        document.getElementById('scrollHint').style.display = 'none';
        return;
    }
    
    document.getElementById('scrollHint').style.display = 'block';
    
    const sorted = [...data].sort((a, b) => new Date(a.datum) - new Date(b.datum));
    
    const labels = sorted.map(x => x.datum);
    const values = sorted.map(x => x.gewicht);
    
    const wrapper = document.getElementById('chartWrapper');
    const canvas = document.getElementById('weightChart');
    
    const chartWidth = Math.max(labels.length * 80, wrapper.clientWidth);
    canvas.style.width = chartWidth + 'px';
    canvas.style.height = '280px';
    canvas.width = chartWidth;
    canvas.height = 280;
    
    if (chart) {
        chart.destroy();
        chart = null;
    }
    
    const ctx = canvas.getContext('2d');
    
    chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'Gewicht (kg)',
                data: values,
                borderColor: '#007aff',
                backgroundColor: 'rgba(0, 122, 255, 0.1)',
                fill: true,
                tension: 0.4,
                pointBackgroundColor: '#007aff',
                pointRadius: 6,
                pointHoverRadius: 8,
                pointBorderColor: '#fff',
                pointBorderWidth: 2
            }]
        },
        options: {
            responsive: false,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    display: false
                },
                tooltip: {
                    callbacks: {
                        label: function(context) {
                            return context.parsed.y + ' kg';
                        }
                    }
                }
            },
            scales: {
                y: {
                    display: false
                },
                x: {
                    grid: {
                        display: false
                    },
                    ticks: {
                        maxRotation: 45,
                        font: {
                            size: 10
                        }
                    }
                }
            }
        },
        plugins: [{
            // SCHWARZE ZAHLEN OHNE HINTERGRUND
            afterDraw: function(chart) {
                const ctx2 = chart.ctx;
                const xAxis = chart.scales.x;
                const yAxis = chart.scales.y;
                const dataset = chart.data.datasets[0];
                const data = dataset.data;
                
                ctx2.save();
                
                data.forEach((value, index) => {
                    const x = xAxis.getPixelForValue(index);
                    const y = yAxis.getPixelForValue(value);
                    
                    // Wert mit 1 Nachkommastelle oder ohne wenn Ganzzahl
                    const displayValue = value % 1 === 0 ? value : value.toFixed(1);
                    
                    // SCHWARZE ZAHLEN, OHNE HINTERGRUND
                    ctx2.fillStyle = '#000000';
                    ctx2.font = 'bold 11px -apple-system, sans-serif';
                    ctx2.textAlign = 'center';
                    ctx2.textBaseline = 'bottom';
                    
                    // Text immer sichtbar über Punkt
                    ctx2.fillText(displayValue, x, y - 8);
                });
                
                ctx2.restore();
            }
        }]
    });
    
    // Automatisch nach RECHTS scrollen
    setTimeout(() => {
        wrapper.scrollLeft = canvas.width - wrapper.clientWidth;
    }, 150);
}

// ============================================
// EXPORT CSV
// ============================================
function exportCSV() {
    const daten = loadData();
    
    if (daten.length === 0) {
        showStatus("❌ Keine Daten zum Exportieren", "error");
        return;
    }
    
    let csv = "Datum,Gewicht kg\n";
    daten.forEach(x => csv += x.datum + "," + x.gewicht + "\n");
    
    const blob = new Blob([csv], { type: "text/csv" });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "Gewicht_Export_" + new Date().toISOString().split('T')[0] + ".csv";
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(link.href);
    
    showStatus("✅ " + daten.length + " Zeilen exportiert", "success");
}

// ============================================
// IMPORT CSV
// ============================================
function importCSV(event) {
    const file = event.target.files[0];
    if (!file) return;
    
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const text = e.target.result;
            const lines = text.split("\n").filter(line => line.trim() !== "");
            
            if (lines.length < 2) {
                showStatus("❌ CSV enthält keine Daten", "error");
                return;
            }
            
            const data = [];
            for (let i = 1; i < lines.length; i++) {
                const parts = lines[i].split(",");
                if (parts.length >= 2) {
                    const datum = parts[0].trim();
                    const gewicht = parseFloat(parts[1].trim());
                    if (datum && !isNaN(gewicht)) {
                        data.push({ datum, gewicht });
                    }
                }
            }
            
            if (data.length === 0) {
                showStatus("❌ Keine gültigen Daten gefunden", "error");
                return;
            }
            
            const existingData = loadData();
            const allData = [...existingData, ...data];
            saveData(allData);
            
            showStatus("✅ " + data.length + " Zeilen importiert", "success");
            
        } catch (err) {
            showStatus("❌ Fehler beim Import: " + err.message, "error");
        }
    };
    reader.readAsText(file);
    event.target.value = "";
}

// ============================================
// APP UPDATE
// ============================================
function appUpdate() {
    if (!confirm("Backup erstellen und App aktualisieren?")) return;
    
    try {
        const daten = loadData();
        
        let csv = "Datum,Gewicht kg\n";
        daten.forEach(x => csv += x.datum + "," + x.gewicht + "\n");
        
        const blob = new Blob([csv], { type: "text/csv" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "Backup_" + new Date().toISOString().split('T')[0] + ".csv";
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(link.href);
        
        showStatus("📥 Backup erstellt", "info");
        
        setTimeout(async () => {
            try {
                document.cookie.split(";").forEach(c => {
                    document.cookie = c.split("=")[0] + "=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
                });
                
                localStorage.clear();
                sessionStorage.clear();
                
                if ("caches" in window) {
                    try {
                        const keys = await caches.keys();
                        for (const key of keys) {
                            await caches.delete(key);
                        }
                    } catch (e) {}
                }
                
                if ("serviceWorker" in navigator && window.location.protocol !== "file:") {
                    try {
                        const regs = await navigator.serviceWorker.getRegistrations();
                        for (const reg of regs) {
                            await reg.unregister();
                        }
                    } catch (e) {}
                }
                
                window.location.reload(true);
                
            } catch (e) {
                showStatus("❌ Fehler: " + e.message, "error");
            }
        }, 2000);
        
    } catch (e) {
        showStatus("❌ Fehler: " + e.message, "error");
    }
}

// ============================================
// SERVICE WORKER
// ============================================
if ("serviceWorker" in navigator && window.location.protocol !== "file:") {
    window.addEventListener("load", () => {
        navigator.serviceWorker.register("service-worker.js")
            .then(() => console.log("✅ SW registriert"))
            .catch(() => console.log("❌ SW Fehler"));
    });
}

// ============================================
// INIT
// ============================================
document.addEventListener("DOMContentLoaded", function() {
    const heute = new Date().toISOString().split('T')[0];
    document.getElementById("datum").value = heute;
    render();
    updateChart();
    document.getElementById("gewicht").addEventListener("keypress", function(e) {
        if (e.key === "Enter") addData();
    });
});
</script>
</body>
</html>
